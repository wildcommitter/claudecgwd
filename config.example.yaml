claude:
  binary: /home/user/.local/bin/claude
  workdir: /home/user/claudecgwd
  # Generate once with: uuidgen
  session_id: REPLACE-WITH-UUID
  permission_mode: bypassPermissions
  pty_cols: 200
  pty_rows: 500
  # Optional extra args passed to `claude`, e.g. ["--model", "opus"]
  extra_args: []
  # How long to wait for new transcript content before declaring an upstream
  # stall and replying with a timeout message. 0 = default (180s).
  stall_timeout_s: 180

telegram:
  # Read the bot token from this env var (NEVER put the token in this file).
  # Leave token_env empty to disable Telegram.
  token_env: TELEGRAM_BOT_TOKEN
  # Numeric Telegram user IDs allowed to drive the assistant. Find yours by
  # messaging @userinfobot on Telegram.
  allowed_user_ids:
    - 123456789

whatsapp:
  # Optional second surface via whatsmeow (linked device). The pairing QR is
  # delivered to you through Telegram as a PNG, so Telegram must be enabled too.
  enabled: false
  # SQLite session store; persists the pairing. Empty = ~/.local/share/assistant/whatsapp.db
  store_path: ""
  # Bare phone numbers (sender "user" part) allowed to drive the assistant —
  # no leading + and no spaces.
  allowed_jids:
    - "34123456789"

router:
  inbound_buffer: 32
  ready_idle_ms: 150
  # Caps a single non-interactive turn. AskUserQuestion waits are detached
  # from this timer (they use the parent context) so a slow human reply
  # won't trip it; only a hung tool or runaway turn will.
  watchdog_timeout_s: 3600
