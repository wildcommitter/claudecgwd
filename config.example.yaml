claude:
  binary: /home/user/.local/bin/claude
  workdir: /home/user/claudecgwd
  # Generate once with: uuidgen
  session_id: REPLACE-WITH-UUID
  permission_mode: bypassPermissions
  pty_cols: 200
  pty_rows: 500
  # Optional extra args passed to `claude`, e.g. ["--model", "opus"]
  extra_args: []
  # How long to wait for new transcript content before declaring an upstream
  # stall and replying with a timeout message. 0 = default (180s).
  stall_timeout_s: 180

telegram:
  # Read the bot token from this env var (NEVER put the token in this file).
  # Leave token_env empty to disable Telegram.
  token_env: TELEGRAM_BOT_TOKEN
  # Numeric Telegram user IDs allowed to drive the assistant. Find yours by
  # messaging @userinfobot on Telegram.
  allowed_user_ids:
    - 123456789

whatsapp:
  # Optional second surface via whatsmeow (linked device). The pairing QR is
  # delivered to you through Telegram as a PNG, so Telegram must be enabled too.
  enabled: false
  # SQLite session store; persists the pairing. Empty = ~/.local/share/assistant/whatsapp.db
  store_path: ""
  # Bare phone numbers (sender "user" part) allowed to drive the assistant —
  # no leading + and no spaces.
  allowed_jids:
    - "34123456789"

files:
  # Where files sent over chat are downloaded. Empty = ~/.local/share/assistant/inbox
  inbox_dir: ""

stt:
  # Transcribe voice/audio messages and feed the text in as the prompt.
  # Set up the engine once with scripts/setup-stt.sh.
  enabled: false
  model: small # faster-whisper model: tiny/base/small/medium/large-v3
  # Transcription command, called as `<command> <audio> <model>`.
  # Empty = <workdir>/scripts/transcribe
  command: ""

speech:
  # Default audio language for transcription (incoming) + spoken replies
  # (outgoing). "auto" = auto-detect speech, English voice. Or a language/
  # country name or code, e.g. "spanish", "mexico", "de". Whisper is
  # multilingual (one model); piper voices download on demand per language.
  # Runtime-toggleable from chat with /speech.
  language: auto

tts:
  # Spoken (voice-note) replies via local piper. Set up once with
  # scripts/setup-tts.sh.
  enabled: false
  # When to speak: auto (only when you sent a voice note), always, or off.
  # Runtime-toggleable from chat with /voice.
  mode: auto
  # piper voice model (must match the one baked by setup-tts.sh / the image).
  voice: en_US-amy-medium
  # Synthesis command, called as `<command> <out.ogg>` with text on stdin.
  # Empty = <workdir>/scripts/tts
  command: ""

reminders:
  # Scheduled proactive pings. The scheduler runs automatically whenever a
  # push surface (Telegram/WhatsApp) is configured; create reminders with
  # scripts/remind. Empty = ~/.local/share/assistant/reminders.jsonl
  store_path: ""

router:
  inbound_buffer: 32
  ready_idle_ms: 150
  # Caps a single non-interactive turn. AskUserQuestion waits are detached
  # from this timer (they use the parent context) so a slow human reply
  # won't trip it; only a hung tool or runaway turn will.
  watchdog_timeout_s: 3600
